name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build
    # Pinned: macos-latest currently resolves to either macos-15 or macos-26 mid-migration,
    # and the macos-15 Xcode cannot compile the Swift Charts usage in WindowsAuditPolicyView.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Build
        run: |
          xcodebuild \
            -scheme "Essential 8 Knowledge Base" \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            clean build \
            CODE_SIGNING_ALLOWED=NO
