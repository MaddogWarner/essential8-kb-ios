name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build
        run: |
          xcodebuild \
            -scheme "Essential 8 Knowledge Base" \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            clean build \
            CODE_SIGNING_ALLOWED=NO
