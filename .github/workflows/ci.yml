name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: |
          xcodebuild \
            -scheme "Essential 8 Knowledge Base" \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -configuration Debug \
            clean build test \
            CODE_SIGNING_ALLOWED=NO